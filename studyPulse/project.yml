name: StudyPulsDashboard
options:
  bundleIdPrefix: com.studypulse
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  StudyPulsDashboard:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: StudyPulsDashboard
        excludes:
          - "**/*.md"
    info:
      path: StudyPulsDashboard/Info.plist
      properties:
        CFBundleName: StudyPulse
        CFBundleDisplayName: StudyPulse
        CFBundleIdentifier: com.studypulse.dashboard
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "13.0"
        CFBundleIconFile: AppIcon
        NSHumanReadableCopyright: "© 2026 StudyPulse"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Google OAuth — 실제 값은 Google Cloud Console에서 발급 후 입력
        GOOGLE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID"
        GOOGLE_CLIENT_SECRET: "YOUR_GOOGLE_CLIENT_SECRET"
        # OAuth 콜백 URL 스킴 등록
        CFBundleURLTypes:
          - CFBundleURLName: com.studypulse.dashboard
            CFBundleURLSchemes:
              - com.studypulse.dashboard
    entitlements:
      path: StudyPulsDashboard/StudyPulsDashboard.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.studypulse.dashboard
        INFOPLIST_FILE: StudyPulsDashboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: StudyPulsDashboard/StudyPulsDashboard.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      Debug:
        DEBUG_INFORMATION_FORMAT: dwarf
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      Release:
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        DEAD_CODE_STRIPPING: YES
    dependencies:
      - framework: AuthenticationServices.framework
        embed: false
